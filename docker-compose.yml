# Local full stack: frontend (nginx) + backend + Postgres
# Usage:
#   cp backend/.env.example backend/.env   # fill secrets
#   docker compose up --build
#
# Railway: deploy `backend/` and `frontend/` as separate services from their Dockerfiles.
# Set backend env vars in Railway; for frontend set build arg VITE_API_BASE_URL to the backend public URL.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lardermind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lardermind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lardermind"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lardermind
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      PORT: 8080
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost
      # Local compose has no hard memory limit; fixed heap keeps usage predictable
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Empty → browser calls /api on same origin; nginx.compose.conf proxies to backend
        VITE_API_BASE_URL: ""
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  lardermind_pg:
